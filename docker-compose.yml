services:
  bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command:
      - python
      - -m
      - reddit_reply_bot
      - --loop
      - --interval-seconds
      - "120"
      - --limit
      - "200"
      - --startup-limit
      - "1000"
      - --summary-interval-seconds
      - "600"
      - --moderation-interval-seconds
      - "3600"
      - --low-karma-threshold
      - "-3"
